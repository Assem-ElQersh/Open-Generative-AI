name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Matches the Node version pinned in the Dockerfile (node:20-alpine).
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build workspace packages
        run: npm run build:packages

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Build Next.js app
        run: npm run build
